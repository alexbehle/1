<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alex Behle</title>
<meta name="description" content="Alex Behle">
<style>
  :root {
    --bg: #ffffff;
    --text: #111111;
    --muted: #6b6b6b;
    --link: #111111;
  }

  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    height: 100%;
  }

  body {
    display: flex;
    align-items: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color: var(--text);
  }

  main {
    max-width: 480px;
    margin: 0 auto;
    padding: 32px;
  }

  p {
    font-size: 19px;
    line-height: 1.6;
    margin: 0 0 18px 0;
    font-weight: 400;
  }

  p:last-of-type {
    margin-bottom: 0;
  }

  a {
    color: var(--link);
    text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-color: var(--muted);
    transition: text-decoration-color 0.15s ease;
  }

  a:hover,
  a:focus {
    text-decoration-color: var(--text);
  }

  a:focus-visible {
    outline: 2px solid var(--text);
    outline-offset: 3px;
  }
</style>
</head>
<body>
  <main>
    <p>Alex Behle is an executive assistant at Khosla Ventures, based in New York.</p>
    <p>Previously, six years in exec ops in the U.S. Senate.</p>
    <p><a href="https://www.linkedin.com/in/alexbehle" target="_blank" rel="noopener noreferrer">linkedin.com/in/alexbehle</a></p>
  </main>
</body>
</html>
